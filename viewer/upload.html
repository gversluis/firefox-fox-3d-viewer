<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="upload.css"/>
    <title>Fox 3D viewer</title>
  </head>

  <body>
    <div id="popup-content">
      <div class="viewer"></div>
      <div class="copy">
        Select local file, or drag file to this window, to display in Fox 3d view extension.<br>
        <br>
		<input type="file" accept=".3dm,.3ds,.3mf,.amf,.dae,.drc,.fbx,.gcode,.glb,.kmz,.lwo,.md2,.mdd,.mpd,.nrrd,.obj,.pcd,.pdb,.ply,.stl,.usdz,.vox,.vtp,.wrl,.xyz" />
      </div>
    </div>
    <script type="text/javascript" src="upload.js"></script>
  </body>
</html>
